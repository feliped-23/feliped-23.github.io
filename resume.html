<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Felipe Diaz — Portfolio</title>
  <meta name="description" content="Felipe Diaz's full portfolio — work experience, engineering projects, education, certificates, and skills.">
  <link rel="stylesheet" href="src/css/main.css">
  <link rel="stylesheet" href="src/css/resume.css">
  <link rel="icon" href="assets/images/favicon.ico">
</head>
<body class="resume-page">

  <!-- Sticky header -->
  <header class="site-header">
    <nav>
      <ul id="site-nav">
        <li class="nav-logo">
          <a href="index.html" class="nav-logo__link" aria-label="Back to home">
            <img src="assets/images/favicon.ico" alt="FD" class="nav-logo__img">
          </a>
        </li>
        <li><a href="resume.html" class="nav-link active">Portfolio</a></li>
        <li><a href="index.html#research" class="nav-link">Research</a></li>
        <li><a href="index.html#about" class="nav-link">About</a></li>
      </ul>
    </nav>
  </header>

  <!-- Locked full-screen app: horizontal category deck -->
  <main class="resume-app">
    <div class="deck">
      <div class="deck__track"><!-- panels injected by resume.js --></div>
    </div>

    <!-- Category prev / next arrows (desktop) -->
    <button class="deck__arrow deck__arrow--prev is-hidden" type="button" aria-label="Previous category">
      <span aria-hidden="true">&lsaquo;</span>
    </button>
    <button class="deck__arrow deck__arrow--next" type="button" aria-label="Next category">
      <span aria-hidden="true">&rsaquo;</span>
    </button>

    <!-- Bottom category navigation -->
    <nav class="cat-nav" aria-label="Portfolio categories">
      <div class="cat-nav__list"><!-- tabs + indicator injected by resume.js --></div>
    </nav>
  </main>

  <!-- Deep-linked experience modal (single reusable shell) -->
  <div class="exp-modal" role="dialog" aria-modal="true" aria-label="Experience details">
    <div class="exp-modal__backdrop"></div>
    <div class="exp-modal__sheet"><!-- content injected on open --></div>
  </div>

  <noscript>
    <p style="text-align:center; padding:8rem 1.5rem; color:var(--text-color-muted);">
      This portfolio needs JavaScript enabled to browse the interactive experience deck.
    </p>
  </noscript>

  <script src="src/js/resume-data.js"></script>
  <script src="src/js/resume.js"></script>
</body>
</html>
